<!doctype html>
<meta charset="utf-8">
<title>Hindi Helper</title>
<style>
  body { font: 14px system-ui, sans-serif; max-width: 420px; margin: 32px auto; padding: 0 16px; }
  input { width: 100%; padding: 8px; margin-top: 6px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
  button { margin-top: 14px; padding: 8px 14px; background: #1f6feb; color: #fff; border: 0; border-radius: 6px; cursor: pointer; }
  #status { margin-left: 10px; color: #1a7f37; }
</style>
<h2>Hindi Helper</h2>
<label>Gemini API Key</label>
<input id="apiKey" type="password" placeholder="paste key from aistudio.google.com">
<div>
  <button id="save">Save</button>
  <span id="status"></span>
</div>
<script src="options.js"></script>
